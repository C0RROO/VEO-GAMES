<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enemy Models Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #060916;
            color: #e2e8f0;
            overflow: hidden;
        }
        #scene-wrap {
            position: fixed;
            inset: 0;
        }
        #hud {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: min(1100px, 94vw);
            z-index: 10;
            pointer-events: none;
        }
        .panel {
            border: 1px solid rgba(125, 211, 252, 0.35);
            background: rgba(15, 23, 42, 0.72);
            border-radius: 12px;
            padding: 10px 12px;
            backdrop-filter: blur(5px);
        }
        h1 {
            font-size: 22px;
            margin-bottom: 6px;
            text-align: center;
        }
        .legend {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 14px;
        }
        .legend-block b {
            display: block;
            margin-bottom: 4px;
            color: #7dd3fc;
        }
        .legend-block p {
            line-height: 1.35;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div id="scene-wrap"></div>
    <div id="hud">
        <div class="panel">
            <h1>Тест 3D моделей врагов</h1>
            <div class="legend">
                <div class="legend-block">
                    <b>Верхний ряд: текущие</b>
                    <p>Crawler, Splitter, Dasher, Bomber, Sniper, Stomper, Brute, Crusher, Elite</p>
                </div>
                <div class="legend-block">
                    <b>Нижний ряд: новые концепты</b>
                    <p>Stomper v2, Warden, Prism, Burster</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x060916);
        scene.fog = new THREE.Fog(0x060916, 12, 42);

        const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 11.2, 21);
        camera.lookAt(0, 1.4, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('scene-wrap').appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.55);
        scene.add(ambient);
        const key = new THREE.DirectionalLight(0xffffff, 0.8);
        key.position.set(8, 14, 8);
        scene.add(key);
        const rim = new THREE.PointLight(0x60a5fa, 0.8, 35);
        rim.position.set(-8, 8, -4);
        scene.add(rim);

        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(60, 60),
            new THREE.MeshPhongMaterial({ color: 0x101935, shininess: 5 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.01;
        scene.add(floor);

        const grid = new THREE.GridHelper(60, 60, 0x274060, 0x1a2948);
        grid.material.opacity = 0.26;
        grid.material.transparent = true;
        scene.add(grid);

        const models = [];

        function label(text, x, z, color = '#cbd5e1') {
            const el = document.createElement('div');
            el.textContent = text;
            el.style.position = 'fixed';
            el.style.fontSize = '13px';
            el.style.padding = '4px 7px';
            el.style.borderRadius = '7px';
            el.style.background = 'rgba(2,6,23,.65)';
            el.style.border = '1px solid rgba(125,211,252,.25)';
            el.style.color = color;
            el.style.pointerEvents = 'none';
            document.body.appendChild(el);
            return { el, x, z };
        }

        const labels = [];

        function makeEyePair(group, s = 1, color = 0xf8fafc) {
            const eGeo = new THREE.SphereGeometry(0.07 * s, 8, 8);
            const eMat = new THREE.MeshBasicMaterial({ color });
            const l = new THREE.Mesh(eGeo, eMat);
            const r = new THREE.Mesh(eGeo, eMat);
            l.position.set(-0.13 * s, 0.55 * s, 0.36 * s);
            r.position.set(0.13 * s, 0.55 * s, 0.36 * s);
            group.add(l);
            group.add(r);
        }

        function currentCrawler() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.SphereGeometry(0.48, 12, 12),
                new THREE.MeshPhongMaterial({ color: 0xef4444, emissive: 0x7f1d1d, shininess: 40 })
            );
            body.position.y = 0.5;
            g.add(body);
            makeEyePair(g, 1, 0xfef08a);
            return g;
        }

        function currentDasher() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.56, 0),
                new THREE.MeshPhongMaterial({ color: 0x60a5fa, emissive: 0x1e3a8a, shininess: 70 })
            );
            body.position.y = 0.55;
            g.add(body);
            const tail = new THREE.Mesh(
                new THREE.ConeGeometry(0.14, 0.6, 8),
                new THREE.MeshPhongMaterial({ color: 0x93c5fd, shininess: 80 })
            );
            tail.position.set(0, 0.55, -0.52);
            tail.rotation.x = Math.PI / 2;
            g.add(tail);
            makeEyePair(g, 1, 0xe0f2fe);
            return g;
        }

        function currentBomber() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.SphereGeometry(0.46, 12, 12),
                new THREE.MeshPhongMaterial({ color: 0xfb7185, emissive: 0x9f1239, shininess: 55 })
            );
            body.position.y = 0.5;
            g.add(body);
            const core = new THREE.Mesh(
                new THREE.SphereGeometry(0.16, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xfff1f2 })
            );
            core.position.y = 0.5;
            g.add(core);
            makeEyePair(g, 1, 0xfff1f2);
            return g;
        }

        function currentSplitter() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 12, 12),
                new THREE.MeshPhongMaterial({ color: 0xf59e0b, emissive: 0x7c2d12, shininess: 45 })
            );
            body.position.y = 0.52;
            g.add(body);
            const seam = new THREE.Mesh(
                new THREE.TorusGeometry(0.44, 0.03, 8, 24),
                new THREE.MeshBasicMaterial({ color: 0xfef3c7, transparent: true, opacity: 0.75 })
            );
            seam.rotation.x = Math.PI / 2;
            seam.position.y = 0.52;
            g.add(seam);
            makeEyePair(g, 1, 0xfff7d6);
            return g;
        }

        function currentSniper() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.32, 0.42, 1.2, 10),
                new THREE.MeshPhongMaterial({ color: 0x38bdf8, emissive: 0x0c4a6e, shininess: 60 })
            );
            body.position.y = 0.62;
            g.add(body);
            const gun = new THREE.Mesh(
                new THREE.BoxGeometry(0.16, 0.12, 0.84),
                new THREE.MeshPhongMaterial({ color: 0xe2e8f0, shininess: 90 })
            );
            gun.position.set(0, 0.7, 0.62);
            g.add(gun);
            makeEyePair(g, 1, 0xb6e3ff);
            return g;
        }

        function currentStomper() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.06, 0.92, 1.02),
                new THREE.MeshPhongMaterial({ color: 0xf97316, emissive: 0x7c2d12, shininess: 25 })
            );
            body.position.y = 0.74;
            g.add(body);

            const shoulderGeo = new THREE.BoxGeometry(0.35, 0.28, 0.42);
            const shoulderMat = new THREE.MeshPhongMaterial({ color: 0xfdba74, shininess: 20 });
            for (const sx of [-0.58, 0.58]) {
                const s = new THREE.Mesh(shoulderGeo, shoulderMat);
                s.position.set(sx, 0.92, 0);
                g.add(s);
            }

            const legGeo = new THREE.BoxGeometry(0.32, 0.56, 0.32);
            const legMat = new THREE.MeshPhongMaterial({ color: 0xfb923c, shininess: 18 });
            for (const sx of [-0.32, 0.32]) {
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(sx, 0.3, 0.08);
                g.add(leg);
            }

            const feetGeo = new THREE.BoxGeometry(0.46, 0.18, 0.5);
            const feetMat = new THREE.MeshPhongMaterial({ color: 0xffa94d, shininess: 12 });
            for (const sx of [-0.32, 0.32]) {
                const f = new THREE.Mesh(feetGeo, feetMat);
                f.position.set(sx, 0.03, 0.16);
                g.add(f);
            }

            const core = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.18, 0),
                new THREE.MeshBasicMaterial({ color: 0xffedd5 })
            );
            core.position.set(0, 0.75, 0.52);
            g.add(core);

            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(1.05, 0.06, 8, 40),
                new THREE.MeshBasicMaterial({ color: 0xfdba74, transparent: true, opacity: 0.65 })
            );
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.04;
            g.add(ring);

            makeEyePair(g, 1.22, 0xffedd5);
            g.userData.stompRing = ring;
            return g;
        }

        function currentBrute() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.15, 1.0, 1.05),
                new THREE.MeshPhongMaterial({ color: 0xdc2626, emissive: 0x7f1d1d, shininess: 18 })
            );
            body.position.y = 0.65;
            g.add(body);
            const hornsMat = new THREE.MeshPhongMaterial({ color: 0xfca5a5, shininess: 30 });
            for (const sx of [-0.36, 0.36]) {
                const horn = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.45, 8), hornsMat);
                horn.position.set(sx, 1.25, 0.28);
                horn.rotation.x = Math.PI;
                g.add(horn);
            }
            makeEyePair(g, 1.25, 0xffe4c7);
            return g;
        }

        function currentCrusher() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.35, 1.18, 1.3),
                new THREE.MeshPhongMaterial({ color: 0xb91c1c, emissive: 0x450a0a, shininess: 12 })
            );
            body.position.y = 0.72;
            g.add(body);
            const plateMat = new THREE.MeshPhongMaterial({ color: 0x7f1d1d, shininess: 8 });
            const plate = new THREE.Mesh(new THREE.BoxGeometry(1.42, 0.2, 1.36), plateMat);
            plate.position.y = 1.22;
            g.add(plate);
            makeEyePair(g, 1.4, 0xfed7aa);
            return g;
        }

        function currentElite() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.DodecahedronGeometry(0.66, 0),
                new THREE.MeshPhongMaterial({ color: 0xc084fc, emissive: 0x581c87, shininess: 75 })
            );
            body.position.y = 0.72;
            g.add(body);
            const crown = new THREE.Mesh(
                new THREE.TorusGeometry(0.8, 0.08, 8, 24),
                new THREE.MeshBasicMaterial({ color: 0xfacc15, transparent: true, opacity: 0.85 })
            );
            crown.rotation.x = Math.PI / 2;
            crown.position.y = 1.34;
            g.add(crown);
            makeEyePair(g, 1.2, 0xf5d0fe);
            g.userData.spinPart = crown;
            return g;
        }

        function newWarden() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.DodecahedronGeometry(0.55, 0),
                new THREE.MeshPhongMaterial({ color: 0x22d3ee, emissive: 0x0e7490, shininess: 80 })
            );
            body.position.y = 0.6;
            g.add(body);
            const halo = new THREE.Mesh(
                new THREE.TorusGeometry(0.78, 0.07, 8, 24),
                new THREE.MeshBasicMaterial({ color: 0x67e8f9, transparent: true, opacity: 0.8 })
            );
            halo.rotation.x = Math.PI / 2;
            halo.position.y = 0.25;
            g.add(halo);
            makeEyePair(g, 1, 0xa5f3fc);
            g.userData.spinPart = halo;
            return g;
        }

        function newLeech() {
            const g = new THREE.Group();
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0x84cc16, emissive: 0x365314, shininess: 45 });
            const mid = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.34, 0.7, 12), bodyMat);
            mid.position.y = 0.65;
            g.add(mid);
            const top = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 12), bodyMat);
            top.position.y = 1.0;
            g.add(top);
            const bottom = new THREE.Mesh(new THREE.SphereGeometry(0.34, 12, 12), bodyMat);
            bottom.position.y = 0.3;
            g.add(bottom);
            for (let i = 0; i < 6; i++) {
                const tentacle = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.04, 0.07, 0.44, 6),
                    new THREE.MeshPhongMaterial({ color: 0xa3e635, shininess: 35 })
                );
                const a = i / 6 * Math.PI * 2;
                tentacle.position.set(Math.cos(a) * 0.23, 0.2, Math.sin(a) * 0.23);
                tentacle.rotation.z = Math.PI / 2.6;
                tentacle.rotation.y = a;
                g.add(tentacle);
            }
            makeEyePair(g, 0.9, 0xd9f99d);
            return g;
        }

        function newPrism() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.ConeGeometry(0.52, 1.05, 4),
                new THREE.MeshPhongMaterial({ color: 0xa78bfa, emissive: 0x4c1d95, shininess: 85 })
            );
            body.position.y = 0.62;
            body.rotation.y = Math.PI / 4;
            g.add(body);
            const shard = new THREE.Mesh(
                new THREE.OctahedronGeometry(0.22, 0),
                new THREE.MeshBasicMaterial({ color: 0xe9d5ff })
            );
            shard.position.y = 1.18;
            g.add(shard);
            makeEyePair(g, 0.88, 0xf5d0fe);
            g.userData.floatPart = shard;
            return g;
        }

        function newBurster() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.IcosahedronGeometry(0.5, 0),
                new THREE.MeshPhongMaterial({ color: 0xfb7185, emissive: 0x831843, shininess: 65 })
            );
            body.position.y = 0.58;
            g.add(body);
            const spikes = [];
            for (let i = 0; i < 8; i++) {
                const s = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.035, 0.06, 0.56, 6),
                    new THREE.MeshPhongMaterial({ color: 0xfda4af, shininess: 70 })
                );
                const a = i / 8 * Math.PI * 2;
                s.position.set(Math.cos(a) * 0.54, 0.34, Math.sin(a) * 0.54);
                const dir = new THREE.Vector3(Math.cos(a), -0.42, Math.sin(a)).normalize();
                s.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
                g.add(s);
                spikes.push(s);
            }
            makeEyePair(g, 1, 0xffe4e6);
            g.userData.spikes = spikes;
            return g;
        }

        function newSentinel() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.76, 1.12, 0.76),
                new THREE.MeshPhongMaterial({ color: 0x94a3b8, emissive: 0x334155, shininess: 30 })
            );
            body.position.y = 0.7;
            g.add(body);
            const visor = new THREE.Mesh(
                new THREE.BoxGeometry(0.52, 0.16, 0.08),
                new THREE.MeshBasicMaterial({ color: 0x22d3ee })
            );
            visor.position.set(0, 0.82, 0.39);
            g.add(visor);
            const shoulderGeo = new THREE.SphereGeometry(0.16, 8, 8);
            const shoulderMat = new THREE.MeshPhongMaterial({ color: 0xcbd5e1, shininess: 55 });
            const l = new THREE.Mesh(shoulderGeo, shoulderMat);
            const r = new THREE.Mesh(shoulderGeo, shoulderMat);
            l.position.set(-0.44, 0.88, 0);
            r.position.set(0.44, 0.88, 0);
            g.add(l);
            g.add(r);
            return g;
        }

        const current = [
            { name: 'Crawler', build: currentCrawler },
            { name: 'Splitter', build: currentSplitter },
            { name: 'Dasher', build: currentDasher },
            { name: 'Bomber', build: currentBomber },
            { name: 'Sniper', build: currentSniper },
            { name: 'Stomper', build: currentStomper },
            { name: 'Brute', build: currentBrute },
            { name: 'Crusher', build: currentCrusher },
            { name: 'Elite', build: currentElite }
        ];

        const concepts = [
            { name: 'Stomper v2', build: currentStomper },
            { name: 'Warden', build: newWarden },
            { name: 'Prism', build: newPrism },
            { name: 'Burster', build: newBurster }
        ];

        function placeRow(items, z, color) {
            const step = 3.6;
            const startX = -((items.length - 1) * step) / 2;
            items.forEach((it, i) => {
                let model;
                try {
                    model = it.build();
                } catch (err) {
                    console.error('Model build failed:', it.name, err);
                    model = new THREE.Group();
                    const fallback = new THREE.Mesh(
                        new THREE.BoxGeometry(0.8, 0.8, 0.8),
                        new THREE.MeshPhongMaterial({ color: 0xef4444, emissive: 0x7f1d1d })
                    );
                    fallback.position.y = 0.5;
                    model.add(fallback);
                }
                model.position.set(startX + i * step, 0, z);
                scene.add(model);
                models.push(model);
                labels.push(label(it.name, model.position.x, model.position.z, color));
            });
        }

        function placeGrid(items, zStart, color, cols = 5, rowGap = 3.2) {
            const rows = Math.ceil(items.length / cols);
            for (let r = 0; r < rows; r++) {
                const rowItems = items.slice(r * cols, r * cols + cols);
                const z = zStart + r * rowGap;
                placeRow(rowItems, z, color);
            }
        }

        placeGrid(current, -5.2, '#93c5fd', 5, 3.2);
        placeRow(concepts, 3.8, '#86efac');

        function worldToScreen(x, y, z) {
            const v = new THREE.Vector3(x, y, z).project(camera);
            return {
                x: (v.x * 0.5 + 0.5) * window.innerWidth,
                y: (-v.y * 0.5 + 0.5) * window.innerHeight
            };
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            models.forEach((m, idx) => {
                m.rotation.y += 0.005 + (idx % 3) * 0.0018;
                m.position.y = Math.sin(t * 1.5 + idx * 0.5) * 0.06;
                if (m.userData.spinPart) m.userData.spinPart.rotation.z += 0.02;
                if (m.userData.floatPart) m.userData.floatPart.position.y = 1.16 + Math.sin(t * 2.2 + idx) * 0.08;
                if (m.userData.spikes) {
                    m.userData.spikes.forEach((s, i) => {
                        s.scale.y = 0.9 + Math.sin(t * 4 + i) * 0.18;
                    });
                }
                if (m.userData.stompRing) {
                    const pulse = 0.94 + Math.sin(t * 2.7 + idx) * 0.08;
                    m.userData.stompRing.scale.set(pulse, pulse, 1);
                    m.userData.stompRing.material.opacity = 0.45 + Math.sin(t * 2.7 + idx) * 0.18;
                    m.userData.stompRing.rotation.z += 0.015;
                }
            });

            labels.forEach((l) => {
                const p = worldToScreen(l.x, 1.7, l.z);
                l.el.style.left = `${p.x - 36}px`;
                l.el.style.top = `${p.y}px`;
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
